<!DOCTYPE html>
<html>
<head>
<title>Analizador IVA</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

.container{
    width:85%;
    margin:40px auto;
    text-align:center;
}

h2{
    font-size:2.5em;
    margin-bottom:30px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

input{
    width:70%;
    padding:15px;
    border-radius:8px;
    border:2px solid #00c6ff;
    font-size:1em;
    background:#222;
    color:white;
}

input:focus{
    outline:none;
    border-color:#00ff88;
    box-shadow: 0 0 10px #00ff88;
}

button{
    padding:15px 40px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg, #00c6ff, #00ff88);
    color:#000;
    cursor:pointer;
    font-weight:bold;
    font-size:1em;
    margin-left:10px;
    transition: transform 0.2s;
}

button:hover{
    transform: scale(1.05);
}

.card{
    background:rgba(255,255,255,0.95);
    color:black;
    margin:25px auto;
    padding:20px;
    border-radius:12px;
    text-align:left;
    max-width:900px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
}

.card h3{
    margin-top:0;
    color:#141e30;
    border-bottom: 3px solid #00c6ff;
    padding-bottom:10px;
}

.card.error{
    background:#ffcccc;
    color:#900;
    border-left: 5px solid #ff0000;
}

.tokens{
    display: flex;
    flex-wrap: wrap;
    gap:10px;
}

.token{
    background:#e8f4f8;
    color:#0066cc;
    padding:6px 12px;
    border-radius:6px;
    font-weight:bold;
    border-left: 3px solid #00c6ff;
    font-family: 'Courier New', monospace;
    font-size:0.9em;
}

.c3d{
    font-family: 'Courier New', monospace;
    background:#f5f5f5;
    padding:15px;
    border-radius:6px;
    border-left: 4px solid #ff9900;
}

.c3d div{
    padding:5px 0;
    color:#333;
}

pre{
    background:#f0f0f0;
    padding:15px;
    border-radius:6px;
    overflow-x:auto;
    font-family: 'Courier New', monospace;
    color:#333;
    line-height:1.6;
    border-left: 4px solid #9933ff;
}
</style>

</head>

<body>

<div class="container">

<h2>Analizador de Expresión IVA Acumulado</h2>

<div>
    <input id="expr" value="subtotal * 0.16 + retencion" placeholder="Ingresa la expresión...">
    <button onclick="analyze()">Analizar</button>
</div>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
